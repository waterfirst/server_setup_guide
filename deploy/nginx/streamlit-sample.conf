# ─────────────────────────────────────────────────────────────────────────────
# Nginx Reverse Proxy 설정 초안
# 서비스  : streamlit-sample
# 내부 URL: http://127.0.0.1:8501
# 공개 경로: https://waterfirst.pro/app/
#
# [적용 방법]
#   sudo ln -s /home/waterfirst/deploy/nginx/streamlit-sample.conf \
#              /etc/nginx/sites-enabled/streamlit-sample.conf
#   sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# Streamlit WebSocket 업그레이드 매핑
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name waterfirst.pro www.waterfirst.pro;

    # ── Let's Encrypt HTTPS 리다이렉트 ──────────────────────────────────────
    # (Certbot 설정 전 임시 주석 처리)
    # return 301 https://$host$request_uri;

    # ── ACME challenge (Let's Encrypt) ───────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # ── 메인 정적 사이트 (기존 web/ 폴더, 건드리지 않음) ─────────────────────
    location / {
        root  /home/waterfirst/web;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # ── Streamlit 샘플 앱 (/app/) ────────────────────────────────────────────
    location /app/ {
        proxy_pass         http://127.0.0.1:8501;
        proxy_http_version 1.1;

        # WebSocket 지원 (Streamlit 필수)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 헤더 전달
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 타임아웃 (Streamlit long-poll 고려)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # 버퍼
        proxy_buffering    off;
        proxy_buffer_size  8k;
    }

    # /app/ 블록이 /app/_stcore/stream (WebSocket) 포함 모든 하위 경로를 처리
    # 별도 _stcore 블록 불필요

    # ── Cerebras Fast Chat (/cerebras/) ─────────────────────────────────────
    location = /cerebras {
        return 301 /cerebras/;
    }

    location /cerebras/ {
        proxy_pass http://127.0.0.1:8502/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /cerebras;

        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }
}

